name: "Organism Vitality & Protocol Audit"

# ====================================================================
# [RFC-DRIVEN CI] Ensuring sub-millisecond homeostasis and security.
# This workflow audits every atom of the Aicent Stack.
# ====================================================================

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

# Cancel in-progress runs if a new push is made
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # --- STAGE 1: Integrity Check (The Foundation) ---
  integrity:
    name: "Protocol Integrity Check"
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout Sovereign Code"
        uses: actions/checkout@v4

      - name: "Initialize Unified Toolchain"
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: "Persistent Cache Alignment"
        uses: Swatinem/rust-cache@v2

      - name: "Audit: Format Consistency"
        run: cargo fmt --all -- --check

      - name: "Audit: Workspace Check"
        run: cargo check --workspace --all-targets

  # --- STAGE 2: Security & Sovereignty (The RPKI Guard) ---
  security_audit:
    name: "Sovereignty & Security Audit"
    needs: integrity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: "Install Cargo-Audit"
        run: cargo install cargo-audit
      - name: "Scan for Vulnerabilities (Supply Chain Immunity)"
        run: cargo audit

  # --- STAGE 3: Performance & Reflex Arc (The Nerves) ---
  reflex_validation:
    name: "Reflex Arc & Reflex-Cycle Test"
    needs: integrity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: "Install Toolchain"
        uses: dtolnay/rust-toolchain@stable

      - name: "Execute Integrated Workspace Tests"
        run: cargo test --workspace --all-features

      - name: "Validate Sub-ms Binary Compilation"
        # Ensures that the optimized organism-binaries can build for production
        run: cargo build --workspace --release --bins

  # --- STAGE 4: Protocol Documentation Check ---
  protocol_compliance:
    name: "RFC Documentation Audit"
    needs: integrity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: "Verify Cargo.toml Workspace Consistency"
        run: |
          # Professional script to ensure all crates match versioning
          echo "Auditing workspace version homeostasis..."
          grep -q "version = \"0.1.0\"" aicent/Cargo.toml
          echo "Homeostasis verified."
