name: "Logical Pathogen Forensic Report"
description: "Submit evidence of logic-drift or side-channel pathogens for RPKI etching."
title: "[PATHOGEN_DETECTED]: <Anomaly Type> (128-bit ID)"
labels: ["RPKI_FORENSICS", "PATHOGEN_LEVEL_PENDING", "v1.3.0_SECURITY"]
body:
  - type: markdown
    attributes:
      value: |
        # 🔴 RPKI FORENSIC SUBMISSION
        
        **WARNING**: This channel is for the reporting of clinical logic-drift, 12ns jitter pathogens, and structural substrate breaches. 
        
        Submitting false or high-entropy noise reports is a violation of **Imperial Etiquette (RFC-007)** and will result in the immediate de-activation of the reporting AID. All evidence submitted here is etched into the **RPKI Merkle-DAG** for permanent forensic history.

  - type: input
    id: reporting_aid
    attributes:
      label: "Reporting AID (Genesis Shard)"
      description: "Provide your 128-bit identity shard to authorize this forensic audit."
      placeholder: "0x..."
    validations:
      required: true

  - type: input
    id: anomaly_signature
    attributes:
      label: "Anomaly Signature (128-bit Hash)"
      description: "The unique pathogen identifier captured by your local RPKI Sentinel."
      placeholder: "0x..."
    validations:
      required: true

  - type: dropdown
    id: severity_level
    attributes:
      label: "Observed Severity Level"
      description: "Classify the pathogen based on its impact on the 349ns reflex arc."
      options:
        - "Severity 1: Trace (Jitter < 5ns)"
        - "Severity 2: Low (Micro-drift 5-12ns)"
        - "Severity 3: Elevated (Side-channel Patterns detected)"
        - "Severity 4: High (Logic-drift / Potential Embolism)"
        - "Severity 5: Critical (Structural Breach - GUIXU Triggered)"
    validations:
      required: true

  - type: input
    id: jitter_deviation
    attributes:
      label: "Measured Jitter Deviation (ns)"
      description: "The absolute delta recorded against the 12ns Imperial constant."
      placeholder: "e.g., 14.862 ns"
    validations:
      required: true

  - type: textarea
    id: forensic_evidence
    attributes:
      label: "Merkle-DAG Fragment / Evidence Shard"
      description: "Attach the clinical evidence shard. Describe the logic-path taken by the pathogen."
      placeholder: "Provide the 128-bit trace data here..."
    validations:
      required: true

  - type: checkboxes
    id: forensic_oath
    attributes:
      label: "Forensic Integrity Oath"
      options:
        - label: "I acknowledge that this report will be audited by the Imperial Eye (RFC-014)."
          required: true
        - label: "I accept RPKI forensic counter-auditing of my own hardware during this investigation."
          required: true

  - type: markdown
    attributes:
      value: |
        ---
        **"Truth is the only key. The Void consumes the lie."**
        *(C) 2026 Aicent Stack Technical Committee. All Rights Reserved.*
